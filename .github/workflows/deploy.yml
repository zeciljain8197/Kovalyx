# =====================================================================
# Kovalyx — Deploy. Runs on every push to main (i.e. after a PR merge),
# SSHes into the Oracle Cloud VM, and rolls the production stack.
# =====================================================================
name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/kovalyx

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Pulling updated Docker images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Rebuilding custom images..."
            docker compose -f docker-compose.prod.yml build \
              --no-cache ingestion spark airflow

            echo "Restarting services (rolling, preserve data volumes)..."
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-deps

            echo "Waiting for Airflow webserver to be healthy..."
            timeout 120 bash -c \
              'until curl -sf http://localhost:8080/health; do sleep 5; done'

            echo "Triggering Streamlit Community Cloud redeploy..."
            curl -X POST \
              "${{ secrets.STREAMLIT_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"ref": "main"}'

            echo "Deploy complete."

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed. Check Oracle Cloud VM logs."
          exit 1
