# =====================================================================
# Kovalyx — CI. Runs on every PR into main; all three jobs must pass
# before a PR is mergeable (configure as a required status check in
# branch protection).
# =====================================================================
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # TruffleHog needs full history to diff base..head for secrets
          # introduced by this PR, not just the merge commit.
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Trivy vulnerability scan (Spark image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: spark/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy vulnerability scan (Airflow image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: airflow/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy vulnerability scan (Ingestion image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ingestion/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 1

  lint-and-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint/test deps
        run: |
          pip install sqlfluff==3.0.7 \
                      dbt-core==1.8.7 \
                      dbt-postgres==1.8.7 \
                      great-expectations==0.18.19 \
                      pytest==8.2.2 \
                      pandas==2.2.2 \
                      pyarrow==16.1.0

      - name: SQLFluff lint — dbt models
        run: |
          sqlfluff lint dbt_project/models/ \
            --dialect postgres \
            --templater dbt \
            --config dbt_project/.sqlfluff

      - name: dbt compile (dev schema)
        env:
          DBT_PG_HOST: ${{ secrets.CI_PG_HOST }}
          DBT_PG_PORT: ${{ secrets.CI_PG_PORT }}
          DBT_PG_DATABASE: ${{ secrets.CI_PG_DATABASE }}
          DBT_PG_USER: ${{ secrets.CI_PG_USER }}
          DBT_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}
        run: |
          cd dbt_project
          dbt compile --profiles-dir . --target dev

      - name: dbt test (dev schema)
        env:
          DBT_PG_HOST: ${{ secrets.CI_PG_HOST }}
          DBT_PG_PORT: ${{ secrets.CI_PG_PORT }}
          DBT_PG_DATABASE: ${{ secrets.CI_PG_DATABASE }}
          DBT_PG_USER: ${{ secrets.CI_PG_USER }}
          DBT_PG_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}
        run: |
          cd dbt_project
          dbt test --profiles-dir . --target dev

      - name: pytest — ingestion + spark + quality Python modules
        # silver_transform.py needs a live Spark cluster and is
        # integration-tested separately, not here. No unit test files
        # exist under these three directories yet (none were part of
        # any session's deliverables so far), so `pytest` would exit 5
        # ("no tests collected") and fail this job for a non-problem —
        # the `|| [ $? -eq 5 ]` guard treats that specific case as a
        # pass while still failing on real test failures or errors.
        run: |
          pytest ingestion/ spark/ quality/ \
            --ignore=spark/silver_transform.py \
            -v --tb=short || [ $? -eq 5 ]

      - name: Python compile check — all .py files
        run: |
          find . -name "*.py" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | xargs -I{} python -m py_compile {}

  docker-build:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build ingestion image
        uses: docker/build-push-action@v5
        with:
          context: ./ingestion
          push: false
          tags: kovalyx/ingestion:ci

      - name: Build spark image
        uses: docker/build-push-action@v5
        with:
          context: ./spark
          push: false
          tags: kovalyx/spark:ci

      - name: Build airflow image
        uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: false
          tags: kovalyx/airflow:ci
