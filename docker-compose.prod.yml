# Production compose file for Kovalyx.
# Usage (see deploy/oracle_cloud_setup.sh):
#   docker compose -f docker-compose.prod.yml up -d
#
# Differences from docker-compose.yml (local dev):
#   - Vault runs in production mode (raft storage, TLS-less internal listener,
#     manually initialized/unsealed by scripts/vault_init.py) instead of dev mode.
#   - Only nginx (80/443) is published to the host. Every other service is
#     reachable only over the internal kovalyx_* Docker networks.
#   - Nginx terminates HTTPS using Let's Encrypt certs (see certbot service)
#     instead of the self-signed dev certs.
#   - All services run with restart: always and no bind-mounted source dirs.

networks:
  kovalyx_bronze_net:
    name: kovalyx_bronze_net
    driver: bridge
    internal: false
  kovalyx_silver_net:
    name: kovalyx_silver_net
    driver: bridge
    internal: false
  kovalyx_gold_net:
    name: kovalyx_gold_net
    driver: bridge
    internal: false

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
  vault_data:
  postgres_metadata_data:
  postgres_gold_data:
  grafana_data:
  prometheus_data:
  loki_data:
  airflow_logs:
  certbot_conf:
  certbot_www:

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  restart: always
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-metadata:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__RBAC: "true"
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: 8125
    AIRFLOW__METRICS__STATSD_PREFIX: kovalyx_airflow
    VAULT_ADDR: http://vault:8200
    VAULT_TOKEN: ${VAULT_TOKEN}
    KOVALYX_MINIO_ENDPOINT: minio:9000
    # See docker-compose.yml's matching comment — seed_data.py reads
    # this name, not KOVALYX_MINIO_ENDPOINT.
    MINIO_ENDPOINT: http://minio:9000
    KOVALYX_KAFKA_BOOTSTRAP: kafka:29092
    KOVALYX_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    KOVALYX_ENV: production
    # The DAG's gold_dbt_run/gold_dbt_test/gold_dbt_snapshot tasks shell
    # out to `dbt` directly inside this container — same DBT_PG_* fix as
    # the standalone `dbt` service below, otherwise those three tasks
    # fail with a missing env_var() error on every run. Points at the
    # managed Supabase project, not a local postgres-gold (there isn't
    # one in production).
    DBT_PG_HOST: ${SUPABASE_DB_HOST}
    DBT_PG_PORT: "5432"
    DBT_PG_DATABASE: ${SUPABASE_DB_NAME}
    DBT_PG_USER: ${SUPABASE_DB_USER}
    DBT_PG_PASSWORD: ${SUPABASE_DB_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/plugins:/opt/airflow/plugins:ro
    - airflow_logs:/opt/airflow/logs
    # Added: the DAG's BashOperator tasks shell out to these directories
    # directly (kafka_producer.py/kafka_consumer.py, spark-submit against
    # silver_transform.py, run_checkpoints.py, seed_data.py/
    # silver_to_postgres_loader.py, dbt run/test/snapshot), and
    # VaultSecretsHook reads vault/.approle-credentials.json — none of
    # this was mounted here before, so every non-Python-operator task in
    # kovalyx_medallion_pipeline would fail immediately in production.
    # dbt_project is intentionally NOT read-only: `dbt run`/`dbt test`
    # write to its target/ and logs/ directories.
    - ./ingestion:/opt/kovalyx/ingestion:ro
    - ./spark:/opt/kovalyx/spark:ro
    - ./quality:/opt/kovalyx/quality:ro
    - ./dbt_project:/opt/kovalyx/dbt_project
    - ./scripts:/opt/kovalyx/scripts:ro
    - ./vault:/opt/kovalyx/vault:ro
  networks:
    - kovalyx_bronze_net
    - kovalyx_silver_net
    - kovalyx_gold_net
  depends_on:
    postgres-metadata:
      condition: service_healthy
    vault:
      condition: service_healthy

services:
  # ------------------------------------------------------------------
  # BRONZE LAYER
  # ------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # See docker-compose.yml's matching comment — ruok is rejected by
      # default in this ZooKeeper version unless explicitly whitelisted,
      # and that requires the KAFKA_OPTS JVM system-property override,
      # not the ZOOKEEPER_4LW_COMMANDS_WHITELIST env var (unsupported by
      # this image's config template despite the plausible name).
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,mntr"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - kovalyx_bronze_net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: always
    # See docker-compose.yml's matching comment / kafka/generate_jaas_and_start.sh
    entrypoint: ["bash", "/opt/kovalyx/generate_jaas_and_start.sh"]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:29092
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      # See docker-compose.yml's matching comment.
      KAFKA_BROKER_USER: ${KAFKA_BROKER_USER}
      KAFKA_BROKER_PASSWORD: ${KAFKA_BROKER_PASSWORD}
      KAFKA_PRODUCER_USER: ${KAFKA_PRODUCER_USER}
      KAFKA_PRODUCER_PASSWORD: ${KAFKA_PRODUCER_PASSWORD}
      KAFKA_CONSUMER_USER: ${KAFKA_CONSUMER_USER}
      KAFKA_CONSUMER_PASSWORD: ${KAFKA_CONSUMER_PASSWORD}
      KAFKA_LISTENER_NAME_SASL_PLAINTEXT_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_BROKER_USER}"
        password="${KAFKA_BROKER_PASSWORD}"
        user_${KAFKA_BROKER_USER}="${KAFKA_BROKER_PASSWORD}"
        user_${KAFKA_PRODUCER_USER}="${KAFKA_PRODUCER_PASSWORD}"
        user_${KAFKA_CONSUMER_USER}="${KAFKA_CONSUMER_PASSWORD}";
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka/generate_jaas_and_start.sh:/opt/kovalyx/generate_jaas_and_start.sh:ro
    networks:
      - kovalyx_bronze_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 --command-config /etc/kafka/kafka_client.properties || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    restart: always
    command:
      - "--kafka.server=kafka:29092"
      - "--sasl.enabled"
      - "--sasl.username=${KAFKA_BROKER_USER}"
      - "--sasl.password=${KAFKA_BROKER_PASSWORD}"
      - "--sasl.mechanism=plain"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kovalyx_bronze_net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SASL_PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_BROKER_USER}"
        password="${KAFKA_BROKER_PASSWORD}";
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - kovalyx_bronze_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Standalone always-on producer/consumer for a live-demo experience
  # without Airflow — see docker-compose.yml's matching comment. Gated
  # behind profiles: ["jobs"] (opt-in only) here too: the
  # kovalyx_medallion_pipeline DAG's kafka_producer_trigger/
  # bronze_kafka_consumer tasks run these exact same scripts under the
  # exact same Kafka consumer group, and running both unconditionally
  # (as this file did previously, with no profiles key at all) means
  # whichever one polls first drains the topic, starving the other.
  kafka-producer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    restart: always
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PRODUCER_USER: ${KAFKA_PRODUCER_USER}
      KAFKA_PRODUCER_PASSWORD: ${KAFKA_PRODUCER_PASSWORD}
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KOVALYX_EVENTS_TOPIC: kovalyx.events
      PRODUCER_EVENTS_PER_SECOND: "3"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - kovalyx_bronze_net
    profiles: ["jobs"]

  kafka-consumer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    restart: always
    command: ["python", "kafka_consumer.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_USER: ${KAFKA_CONSUMER_USER}
      KAFKA_CONSUMER_PASSWORD: ${KAFKA_CONSUMER_PASSWORD}
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KOVALYX_EVENTS_TOPIC: kovalyx.events
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_BRONZE_WRITER_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_BRONZE_WRITER_SECRET_KEY}
      MINIO_BRONZE_BUCKET: bronze
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - kovalyx_bronze_net
    profiles: ["jobs"]

  # ------------------------------------------------------------------
  # SILVER LAYER
  # ------------------------------------------------------------------
  spark-master:
    # See docker-compose.yml's matching comment — not the stock image.
    build:
      context: ./spark
      dockerfile: Dockerfile
    restart: always
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
    healthcheck:
      # See docker-compose.yml's matching comment — no curl/wget in this image.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-worker:
    # See spark-master's matching comment.
    build:
      context: ./spark
      dockerfile: Dockerfile
    restart: always
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    depends_on:
      - spark-master
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net

  postgres-metadata:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_METADATA_USER}
      POSTGRES_PASSWORD: ${POSTGRES_METADATA_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: "${AIRFLOW_DB_NAME},${GE_METADATA_DB_NAME},${AUDIT_DB_NAME}"
    volumes:
      - postgres_metadata_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    networks:
      - kovalyx_silver_net
      - kovalyx_gold_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_METADATA_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # GOLD LAYER
  # NOTE: in production, Gold lives in managed Supabase Postgres, not a
  # local container. dbt and the loader connect out to Supabase using
  # SUPABASE_DB_HOST / SUPABASE_DB_* secrets pulled from Vault.
  # ------------------------------------------------------------------
  dbt:
    build:
      context: ./dbt_project
      dockerfile: Dockerfile
    restart: "no"
    environment:
      DBT_PROFILES_DIR: /opt/kovalyx/dbt_project
      # profiles.yml.example reads DBT_PG_* via env_var(), not GOLD_DB_*
      # — this container previously set the latter, so `dbt run` would
      # fail immediately with "env var required but not provided:
      # 'DBT_PG_HOST'".
      DBT_PG_HOST: ${SUPABASE_DB_HOST}
      DBT_PG_PORT: "5432"
      DBT_PG_DATABASE: ${SUPABASE_DB_NAME}
      DBT_PG_USER: ${SUPABASE_DB_USER}
      DBT_PG_PASSWORD: ${SUPABASE_DB_PASSWORD}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    networks:
      - kovalyx_gold_net
    profiles: ["jobs"]

  vault:
    image: hashicorp/vault:1.15
    restart: always
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://vault:8200
    volumes:
      - vault_data:/vault/file
      - ./vault:/vault/config
    command: server -config=/vault/config/vault-config.hcl
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net
    healthcheck:
      # 127.0.0.1, not localhost — see docker-compose.yml's vault
      # healthcheck comment (same "localhost" resolves to ::1 issue).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200"]
      interval: 10s
      timeout: 5s
      retries: 10
    # NOT published to the host. Only reachable inside the Docker networks
    # above. Initialized/unsealed once via scripts/vault_init.py during
    # deploy/oracle_cloud_setup.sh.

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  statsd-exporter:
    image: prom/statsd-exporter:latest
    restart: always
    networks:
      - kovalyx_gold_net

  # ------------------------------------------------------------------
  # OBSERVABILITY
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net

  loki:
    image: grafana/loki:2.9.8
    restart: always
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - kovalyx_gold_net

  promtail:
    image: grafana/promtail:2.9.8
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - kovalyx_gold_net

  grafana:
    image: grafana/grafana:11.0.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${KOVALYX_DOMAIN}/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
    networks:
      - kovalyx_gold_net

  streamlit-monitor:
    build:
      context: ./streamlit_monitor
      dockerfile: Dockerfile
    restart: always
    environment:
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_AUDIT_READER_KEY: ${SUPABASE_AUDIT_READER_KEY}
      GOLD_DB_HOST: ${SUPABASE_DB_HOST}
      GOLD_DB_PORT: "5432"
      GOLD_DB_NAME: ${SUPABASE_DB_NAME}
      AUDIT_READER_DB_USER: ${AUDIT_READER_DB_USER}
      AUDIT_READER_DB_PASSWORD: ${AUDIT_READER_DB_PASSWORD}
      GRAFANA_EMBED_URL: https://${KOVALYX_DOMAIN}/grafana/
    networks:
      - kovalyx_gold_net
    # Not published to the host in production; the public instance runs on
    # Streamlit Community Cloud. This copy is available for on-VM debugging
    # via `docker compose exec` / an SSH tunnel only.

  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - airflow-webserver
      - grafana
      - streamlit-monitor
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    depends_on:
      - nginx
