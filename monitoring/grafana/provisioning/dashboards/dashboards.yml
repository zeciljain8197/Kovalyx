# =====================================================================
# Kovalyx — Grafana dashboard auto-provisioning.
# `path` matches docker-compose.yml's grafana volume mount
# (./monitoring/grafana/dashboards -> /var/lib/grafana/dashboards).
# =====================================================================
apiVersion: 1

providers:
  - name: kovalyx-dashboards
    orgId: 1
    folder: Kovalyx
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
