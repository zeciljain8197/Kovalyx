# =====================================================================
# Kovalyx — Promtail log-shipper config. Mounted into the `promtail`
# service at /etc/promtail/config.yml, alongside the read-only Docker
# socket + container-log directory mounts (docker-compose.yml) that
# `docker_sd_configs` below needs to discover Kovalyx's containers.
# =====================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["kovalyx-*"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:
