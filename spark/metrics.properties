# Enables Spark's built-in Prometheus servlet so spark-master's UI port
# (8080) also serves /metrics/master/prometheus/ — the endpoint
# monitoring/prometheus.yml's kovalyx-spark job already scrapes.
# Mounted into both spark-master and spark-worker at
# /opt/bitnami/spark/conf/metrics.properties, which Spark loads
# automatically from SPARK_CONF_DIR at startup (no extra flag needed).
*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
*.sink.prometheusServlet.path=/metrics/prometheus
master.sink.prometheusServlet.path=/metrics/master/prometheus
applications.sink.prometheusServlet.path=/metrics/applications/prometheus
