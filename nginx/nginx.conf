# =====================================================================
# Kovalyx — Nginx reverse proxy. Mounted read-only into the `nginx`
# service (docker-compose.yml, profile "full") at /etc/nginx/nginx.conf,
# alongside ./nginx/certs -> /etc/nginx/certs.
#
# Pre-check finding: airflow-webserver and spark-master both listen on
# container-internal port 8080, but that's not a real conflict here —
# nginx reaches services by Compose service name over the Docker
# network, not via host port mappings (spark-master's host mapping is
# 127.0.0.1:8082:8080; nginx never touches it). The airflow upstream
# below is `airflow-webserver:8080`, the container-internal port.
# =====================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream airflow {
        server airflow-webserver:8080;
    }

    upstream minio_console {
        server minio:9001;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream streamlit {
        server streamlit-monitor:8501;
    }

    # HTTP -> HTTPS redirect (production). In dev, use the HTTP-only
    # server on :8090 below instead of this one — real certs won't exist
    # under ./nginx/certs unless a real TLS setup (certbot or otherwise)
    # has populated them; generate_dev_cert_and_start.sh only provides a
    # self-signed placeholder.
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server — activated in production once nginx/certs/fullchain.pem
    # and privkey.pem have been populated with a real certificate.
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /airflow/ {
            proxy_pass http://airflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /minio/ {
            proxy_pass http://minio_console/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Internal ops monitor — intentionally not linked from the public
        # Next.js frontend, but still reachable here for operators who
        # know the path.
        location /pipeline-monitor/ {
            proxy_pass http://streamlit/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Dev-mode HTTP-only server (no TLS). Comment out in production and
    # rely on the HTTPS server above once real certs are in place.
    server {
        listen 8090;
        server_name _;

        location /airflow/ {
            proxy_pass http://airflow/;
            proxy_set_header Host $host;
        }

        location /minio/ {
            proxy_pass http://minio_console/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /grafana/ {
            proxy_pass http://grafana/;
        }

        location /pipeline-monitor/ {
            proxy_pass http://streamlit/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
