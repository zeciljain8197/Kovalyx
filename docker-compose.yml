networks:
  kovalyx_bronze_net:
    name: kovalyx_bronze_net
    driver: bridge
  kovalyx_silver_net:
    name: kovalyx_silver_net
    driver: bridge
  kovalyx_gold_net:
    name: kovalyx_gold_net
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  minio_data:
  vault_data:
  postgres_metadata_data:
  postgres_gold_data:
  grafana_data:
  prometheus_data:
  loki_data:
  airflow_logs:

x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-metadata:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__RBAC: "true"
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: 8125
    AIRFLOW__METRICS__STATSD_PREFIX: kovalyx_airflow
    VAULT_ADDR: http://vault:8200
    VAULT_TOKEN: ${VAULT_TOKEN}
    KOVALYX_MINIO_ENDPOINT: minio:9000
    # Different scripts use different naming conventions for the same
    # endpoint (silver_to_postgres_loader.py reads KOVALYX_MINIO_ENDPOINT
    # above; seed_data.py/kafka_consumer.py read plain MINIO_ENDPOINT
    # with a scheme prefix) — only the former was set here, so
    # seed_data.py silently fell back to its http://localhost:9000
    # default, which inside this container means itself, not minio.
    MINIO_ENDPOINT: http://minio:9000
    KOVALYX_KAFKA_BOOTSTRAP: kafka:29092
    KOVALYX_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    # The DAG's gold_dbt_run/gold_dbt_test/gold_dbt_snapshot tasks shell
    # out to `dbt` directly inside this container — same DBT_PG_* fix as
    # the standalone `dbt` service below, otherwise those three tasks
    # fail with a missing env_var() error on every run.
    DBT_PG_HOST: postgres-gold
    DBT_PG_PORT: "5432"
    DBT_PG_DATABASE: ${GOLD_DB_NAME}
    DBT_PG_USER: ${GOLD_DB_USER}
    DBT_PG_PASSWORD: ${GOLD_DB_PASSWORD}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - airflow_logs:/opt/airflow/logs
    - ./ingestion:/opt/kovalyx/ingestion
    - ./spark:/opt/kovalyx/spark
    - ./quality:/opt/kovalyx/quality
    - ./dbt_project:/opt/kovalyx/dbt_project
    # Added Session 3: the DAG shells out to scripts/seed_data.py and
    # scripts/silver_to_postgres_loader.py, and VaultSecretsHook /
    # spark-submit's driver process (client deploy mode runs in this
    # container) both read vault/.approle-credentials.json — neither
    # was mounted here before.
    - ./scripts:/opt/kovalyx/scripts
    - ./vault:/opt/kovalyx/vault
  networks:
    - kovalyx_bronze_net
    - kovalyx_silver_net
    - kovalyx_gold_net
  depends_on:
    postgres-metadata:
      condition: service_healthy
    vault:
      condition: service_healthy

services:
  # ------------------------------------------------------------------
  # BRONZE LAYER
  # ------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: kovalyx-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # ZooKeeper 3.8+ (bundled in this image) whitelists only `srvr`
      # among its four-letter-word commands by default — `ruok`, which
      # the healthcheck below needs, is rejected unless explicitly
      # whitelisted, leaving the container permanently "unhealthy"
      # despite actually running fine. ZOOKEEPER_4LW_COMMANDS_WHITELIST
      # looks like it should work (matches the dotted zoo.cfg property
      # name) but this image's zookeeper.properties.template doesn't
      # actually translate it — verified by inspecting the template
      # directly. The JVM system-property override via KAFKA_OPTS (read
      # by zookeeper-server-start's underlying launcher) does work,
      # confirmed against a throwaway container.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,mntr"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - kovalyx_bronze_net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kovalyx-kafka
    # Overrides the image's default entrypoint — see
    # kafka/generate_jaas_and_start.sh for why (it writes the JAAS/client
    # config files the image never generates itself, and skips the
    # image's default `ensure` preflight step, which fails against a
    # non-SASL ZooKeeper despite the broker itself starting up fine).
    entrypoint: ["bash", "/opt/kovalyx/generate_jaas_and_start.sh"]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_PLAINTEXT_HOST:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:29092,SASL_PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:29092,SASL_PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"
      # kafka/generate_jaas_and_start.sh needs these directly — they
      # were previously only used as compose-level ${...} substitution
      # tokens inside the JAAS_CONFIG strings below, never passed
      # through to the container as their own env vars.
      KAFKA_BROKER_USER: ${KAFKA_BROKER_USER}
      KAFKA_BROKER_PASSWORD: ${KAFKA_BROKER_PASSWORD}
      KAFKA_PRODUCER_USER: ${KAFKA_PRODUCER_USER}
      KAFKA_PRODUCER_PASSWORD: ${KAFKA_PRODUCER_PASSWORD}
      KAFKA_CONSUMER_USER: ${KAFKA_CONSUMER_USER}
      KAFKA_CONSUMER_PASSWORD: ${KAFKA_CONSUMER_PASSWORD}
      KAFKA_LISTENER_NAME_SASL_PLAINTEXT_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_BROKER_USER}"
        password="${KAFKA_BROKER_PASSWORD}"
        user_${KAFKA_BROKER_USER}="${KAFKA_BROKER_PASSWORD}"
        user_${KAFKA_PRODUCER_USER}="${KAFKA_PRODUCER_PASSWORD}"
        user_${KAFKA_CONSUMER_USER}="${KAFKA_CONSUMER_PASSWORD}";
      KAFKA_LISTENER_NAME_SASL_PLAINTEXT_HOST_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_BROKER_USER}"
        password="${KAFKA_BROKER_PASSWORD}"
        user_${KAFKA_BROKER_USER}="${KAFKA_BROKER_PASSWORD}"
        user_${KAFKA_PRODUCER_USER}="${KAFKA_PRODUCER_PASSWORD}"
        user_${KAFKA_CONSUMER_USER}="${KAFKA_CONSUMER_PASSWORD}";
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: kafka
    ports:
      - "127.0.0.1:9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./kafka/generate_jaas_and_start.sh:/opt/kovalyx/generate_jaas_and_start.sh:ro
    networks:
      - kovalyx_bronze_net
    healthcheck:
      # --command-config needs a client properties file (security.protocol/
      # sasl.mechanism/sasl.jaas.config), not the raw JAAS file the
      # previous version of this check pointed at (which would never
      # actually authenticate).
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 --command-config /etc/kafka/kafka_client.properties || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kovalyx-kafka-exporter
    command:
      - "--kafka.server=kafka:29092"
      - "--sasl.enabled"
      - "--sasl.username=${KAFKA_BROKER_USER}"
      - "--sasl.password=${KAFKA_BROKER_PASSWORD}"
      - "--sasl.mechanism=plain"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kovalyx_bronze_net
    ports:
      - "127.0.0.1:9308:9308"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: kovalyx-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: SASL_PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: SASL_PLAINTEXT
      SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM: PLAIN
      SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_BROKER_USER}"
        password="${KAFKA_BROKER_PASSWORD}";
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "127.0.0.1:8081:8081"
    networks:
      - kovalyx_bronze_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: kovalyx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    # The originally-pinned RELEASE.2024-06-11T02-25-16Z tag has since
    # been pruned from Docker Hub (minio/mc periodically removes old
    # release tags) — this is the closest still-available tag to that
    # era, confirmed pullable.
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: kovalyx-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set kovalyx http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p kovalyx/bronze kovalyx/silver kovalyx/gold &&
      mc ilm add --expiry-days 7 kovalyx/bronze &&
      mc admin user add kovalyx ${MINIO_BRONZE_WRITER_ACCESS_KEY} ${MINIO_BRONZE_WRITER_SECRET_KEY} &&
      mc admin user add kovalyx ${MINIO_SILVER_ACCESS_KEY} ${MINIO_SILVER_SECRET_KEY} &&
      mc admin user add kovalyx ${MINIO_GOLD_READER_ACCESS_KEY} ${MINIO_GOLD_READER_SECRET_KEY} &&
      mc admin policy attach kovalyx readwrite --user ${MINIO_BRONZE_WRITER_ACCESS_KEY} &&
      mc admin policy attach kovalyx readwrite --user ${MINIO_SILVER_ACCESS_KEY} &&
      mc admin policy attach kovalyx readonly --user ${MINIO_GOLD_READER_ACCESS_KEY} &&
      exit 0
      "
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net

  # Standalone always-on producer/consumer for a live-demo experience
  # without Airflow. Deliberately NOT in the "full" profile: the
  # kovalyx_medallion_pipeline DAG's kafka_producer_trigger/
  # bronze_kafka_consumer tasks run these exact same scripts under the
  # exact same Kafka consumer group (kovalyx-bronze-consumer) — running
  # both at once means whichever one polls first drains the topic, and
  # the other gets nothing, which surfaced as the DAG's consumer task
  # committing zero offsets ("Commit failed: Local: No offset stored")
  # whenever this container had already siphoned off all the events.
  # Opt in explicitly with `--profile jobs` if you want the standalone
  # live-demo mode instead of Airflow-driven ingestion.
  kafka-producer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: kovalyx-kafka-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PRODUCER_USER: ${KAFKA_PRODUCER_USER}
      KAFKA_PRODUCER_PASSWORD: ${KAFKA_PRODUCER_PASSWORD}
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KOVALYX_EVENTS_TOPIC: kovalyx.events
      PRODUCER_EVENTS_PER_SECOND: "5"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - kovalyx_bronze_net
    restart: unless-stopped
    profiles: ["jobs"]

  kafka-consumer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: kovalyx-kafka-consumer
    command: ["python", "kafka_consumer.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_USER: ${KAFKA_CONSUMER_USER}
      KAFKA_CONSUMER_PASSWORD: ${KAFKA_CONSUMER_PASSWORD}
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      KOVALYX_EVENTS_TOPIC: kovalyx.events
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_BRONZE_WRITER_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_BRONZE_WRITER_SECRET_KEY}
      MINIO_BRONZE_BUCKET: bronze
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - kovalyx_bronze_net
    restart: unless-stopped
    profiles: ["jobs"]

  # ------------------------------------------------------------------
  # SILVER LAYER
  # ------------------------------------------------------------------
  spark-master:
    # Not the stock image: spark/Dockerfile layers presidio/spacy/JARs
    # on top — silver_pyspark_transform's executor-side PII-masking UDFs
    # need those, and the stock image never had them.
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: kovalyx-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "127.0.0.1:8082:8080"
      - "127.0.0.1:7077:7077"
    volumes:
      - ./spark:/opt/kovalyx/spark
      - ./spark/metrics.properties:/opt/bitnami/spark/conf/metrics.properties:ro
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      # Executors write PII/pipeline audit records via JDBC to
      # postgres-gold's audit schema (see kovalyx-silver's Vault policy).
      - kovalyx_gold_net
    healthcheck:
      # bitnamilegacy/spark has neither curl nor wget; python3 (bundled
      # with the image) is used instead.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-worker:
    # See spark-master's matching comment.
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: kovalyx-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    depends_on:
      - spark-master
    volumes:
      - ./spark:/opt/kovalyx/spark
      - ./spark/metrics.properties:/opt/bitnami/spark/conf/metrics.properties:ro
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net

  postgres-metadata:
    image: postgres:16-alpine
    container_name: kovalyx-postgres-metadata
    environment:
      POSTGRES_USER: ${POSTGRES_METADATA_USER}
      POSTGRES_PASSWORD: ${POSTGRES_METADATA_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: "${AIRFLOW_DB_NAME},${GE_METADATA_DB_NAME},${AUDIT_DB_NAME}"
    volumes:
      - postgres_metadata_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      # Host port 5432 commonly collides with a locally-installed
      # Postgres — 5434 avoids that. Container-internal port (what every
      # other service in this stack actually connects to, via
      # postgres-metadata:5432 over the Docker network) is unaffected.
      - "127.0.0.1:5434:5432"
    networks:
      - kovalyx_silver_net
      - kovalyx_gold_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_METADATA_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------
  # GOLD LAYER
  # ------------------------------------------------------------------
  postgres-gold:
    image: postgres:16-alpine
    container_name: kovalyx-postgres-gold
    environment:
      POSTGRES_USER: ${GOLD_DB_USER}
      POSTGRES_PASSWORD: ${GOLD_DB_PASSWORD}
      POSTGRES_DB: ${GOLD_DB_NAME}
    volumes:
      - postgres_gold_data:/var/lib/postgresql/data
      - ./scripts/supabase_schema.sql:/docker-entrypoint-initdb.d/01_supabase_schema.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - kovalyx_gold_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GOLD_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  dbt:
    build:
      context: ./dbt_project
      dockerfile: Dockerfile
    container_name: kovalyx-dbt
    environment:
      DBT_PROFILES_DIR: /opt/kovalyx/dbt_project
      # profiles.yml.example reads DBT_PG_* via env_var(), not GOLD_DB_*
      # — this container previously set the latter, so `dbt run` would
      # fail immediately with "env var required but not provided:
      # 'DBT_PG_HOST'".
      DBT_PG_HOST: postgres-gold
      DBT_PG_PORT: "5432"
      DBT_PG_DATABASE: ${GOLD_DB_NAME}
      DBT_PG_USER: ${GOLD_DB_USER}
      DBT_PG_PASSWORD: ${GOLD_DB_PASSWORD}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    volumes:
      - ./dbt_project:/opt/kovalyx/dbt_project
    depends_on:
      postgres-gold:
        condition: service_healthy
    networks:
      - kovalyx_gold_net
    profiles: ["jobs"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kovalyx-frontend
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # Server-only — createAdminClient() throws without this (caught
      # silently by every lib/queries/pipeline.ts function's own
      # try/catch), which is why the /pipeline page and the
      # PipelineStatusBadge always showed empty/unknown state despite
      # the underlying Supabase data and grants being correct.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - kovalyx_gold_net
    profiles: ["full"]

  vault:
    image: hashicorp/vault:1.15
    container_name: kovalyx-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    volumes:
      - vault_data:/vault/file
      # NOT ./vault:/vault/config here (unlike docker-compose.prod.yml).
      # vault-config.hcl's own listener stanza would load alongside the
      # VAULT_DEV_* env vars above, and Vault would try to bind
      # 0.0.0.0:8200 twice in the same process — once for dev mode, once
      # from the mounted config — and fail with "address already in
      # use" (an in-container bind conflict, not a host port conflict).
      # Dev mode needs no config file at all; vault_init.py's
      # --mode dev path talks to it purely over the API.
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net
    healthcheck:
      # 127.0.0.1, not localhost: this image's wget resolves "localhost"
      # to ::1 first, and Vault's listener only binds 0.0.0.0 (IPv4),
      # so every check failed with "connection refused" despite Vault
      # actually being up and unsealed (confirmed via direct exec).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: kovalyx-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Kovalyx \
          --lastname Admin \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: kovalyx-airflow-webserver
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: kovalyx-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: kovalyx-statsd-exporter
    ports:
      - "127.0.0.1:9102:9102"
    networks:
      - kovalyx_gold_net

  # ------------------------------------------------------------------
  # OBSERVABILITY
  # ------------------------------------------------------------------
  # Collects one-shot metrics from the Silver transform, GE checkpoint
  # runner, and Silver->Postgres loader — all three run as batch jobs
  # inside the Airflow container rather than as long-lived scrape
  # targets, so they push here instead (see PROMETHEUS_PUSHGATEWAY_URL
  # in .env.example and monitoring/prometheus.yml's kovalyx-pushgateway
  # job, both of which already assumed this service existed).
  pushgateway:
    image: prom/pushgateway:v1.9.0
    container_name: kovalyx-pushgateway
    ports:
      - "127.0.0.1:9091:9091"
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: kovalyx-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net

  loki:
    image: grafana/loki:2.9.8
    container_name: kovalyx-loki
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - kovalyx_gold_net

  promtail:
    image: grafana/promtail:2.9.8
    container_name: kovalyx-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - kovalyx_gold_net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: kovalyx-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - kovalyx_gold_net

  streamlit-monitor:
    build:
      context: ./streamlit_monitor
      dockerfile: Dockerfile
    container_name: kovalyx-streamlit-monitor
    environment:
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_AUDIT_READER_KEY: ${SUPABASE_AUDIT_READER_KEY}
      GOLD_DB_HOST: postgres-gold
      GOLD_DB_PORT: "5432"
      GOLD_DB_NAME: ${GOLD_DB_NAME}
      AUDIT_READER_DB_USER: ${AUDIT_READER_DB_USER}
      AUDIT_READER_DB_PASSWORD: ${AUDIT_READER_DB_PASSWORD}
      GRAFANA_EMBED_URL: http://localhost:3000
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres-gold:
        condition: service_healthy
    networks:
      - kovalyx_gold_net
    profiles: ["full"]

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: kovalyx-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Not :ro — generate_dev_cert_and_start.sh writes a self-signed
      # placeholder here if no real cert exists yet (see that file).
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/generate_dev_cert_and_start.sh:/docker-entrypoint.d/00-generate-dev-cert.sh:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - airflow-webserver
      - grafana
    networks:
      - kovalyx_bronze_net
      - kovalyx_silver_net
      - kovalyx_gold_net
    profiles: ["full"]
